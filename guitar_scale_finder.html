<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎸 Guitar Scale Finder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--borde:#30363d;
  --acento:#e94560;--acento2:#ffd700;--txt:#e6edf3;--txt2:#8b949e;
  --madera:#3d2a14;--madera2:#5c3d1e;--fret:#8b7355;--cuerda:#c8b88a;--r:8px;
  --panel-w:300px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh}
.app-header{background:var(--bg2);border-bottom:2px solid var(--acento);padding:12px 16px;position:sticky;top:0;z-index:100}
.hdr{display:flex;align-items:center;gap:12px}
.hdr-ico{font-size:1.8rem;line-height:1}
.hdr-txt h1{font-size:1.3rem;color:var(--acento2);letter-spacing:-0.5px}
.hdr-txt p{color:var(--txt2);font-size:12px}
.btn-menu{display:none;background:none;border:1px solid var(--borde);color:var(--txt);border-radius:6px;padding:6px 10px;font-size:18px;cursor:pointer;margin-left:auto}
.app-body{display:flex;flex:1;min-height:0}
.panel-izq{width:var(--panel-w);min-width:var(--panel-w);background:var(--bg2);border-right:1px solid var(--borde);overflow-y:auto;display:flex;flex-direction:column;transition:transform .25s}
.sec{padding:14px;border-bottom:1px solid var(--borde)}
.sec-escalas{flex:1}
.sec-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--acento2);margin-bottom:10px}
.inp-grp{display:flex;gap:6px;margin-bottom:8px}
.inp{flex:1;background:var(--bg);border:1px solid var(--borde);border-radius:var(--r);padding:8px 10px;color:var(--txt);font-size:14px;outline:none;transition:border-color .15s;min-width:0}
.inp:focus{border-color:var(--acento)}
.btn-add{background:var(--acento);color:#fff;border:none;border-radius:var(--r);width:36px;font-size:20px;cursor:pointer;flex-shrink:0}
.btn-add:hover{background:#c73352}
.err-msg{color:#ff6666;font-size:12px;margin-bottom:6px}
.acordes-rapidos{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.btn-rapido{background:var(--bg3);color:var(--txt2);border:1px solid var(--borde);border-radius:20px;padding:3px 9px;font-size:12px;cursor:pointer;transition:all .15s}
.btn-rapido:hover{color:var(--acento2);border-color:var(--acento2)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:24px}
.txt-vacio{color:var(--txt2);font-size:12px;font-style:italic}
.chip{display:flex;align-items:center;gap:4px;background:rgba(233,69,96,.12);border:1px solid var(--acento);border-radius:20px;padding:3px 8px;font-size:13px;font-weight:600}
.chip-del{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:15px;line-height:1;padding:0 0 1px}
.chip-del:hover{color:var(--acento)}
.btn-txt{background:none;border:1px solid var(--borde);color:var(--txt2);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.btn-txt:hover{border-color:var(--acento);color:var(--acento)}
.esc-item{background:var(--bg);border:1px solid var(--borde);border-left:4px solid;border-radius:var(--r);padding:9px 11px;cursor:pointer;margin-bottom:7px;position:relative;transition:background .15s}

.esc-cab{display:flex;justify-content:space-between;align-items:baseline}

.tab:hover{color:var(--txt)}

.det-barra{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}

.panel-res{margin-top:14px;background:var(--bg2);border:1px solid var(--borde);border-radius:var(--r);padding:12px}

.ac-fila-top{display:flex;align-items:center;gap:8px}

.ac-tipo{font-size:11px;color:var(--txt2);flex:1}
.ac-notas-det{margin-top:4px;font-size:12px;color:var(--acento2);letter-spacing:.5px}
.btn-ag-det{background:rgba(233,69,96,.15);color:var(--acento);border:1px solid var(--acento);border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer}
.btn-ag-det:hover{background:rgba(233,69,96,.3)}
.mapa-ctrl{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end}
.ctrl-grp{display:flex;flex-direction:column;gap:4px}
.ctrl-lab{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.ctrl-sel{background:var(--bg2);color:var(--txt);border:1px solid var(--borde);border-radius:6px;padding:6px 10px;font-size:13px;outline:none;cursor:pointer}
.ctrl-sel:focus{border-color:var(--acento2)}
.btn-play{background:rgba(76,175,80,.15);color:#4CAF50;border:1px solid #4CAF50;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-play:hover{background:rgba(76,175,80,.3)}
.btn-play.playing{background:rgba(233,69,96,.15);color:var(--acento);border-color:var(--acento)}
.sw-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--txt2);user-select:none}
.sw-track{display:inline-flex;width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.sw-thumb{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.acorde-banner{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--borde);border-radius:var(--r);padding:10px 14px;margin-top:10px;flex-wrap:wrap}
.acorde-banner-nom{font-size:18px;font-weight:800}
.acorde-notas-row{display:flex;flex-wrap:wrap;gap:5px}
.nota-badge{background:var(--bg3);border:1px solid var(--borde);border-radius:20px;padding:2px 9px;font-size:12px;font-weight:600}
.banner-timer{font-size:11px;color:var(--txt2);margin-left:auto}
.leyenda{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.ley-item{display:flex;align-items:center;gap:5px}
.ley-col{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ley-txt{font-size:11px;color:var(--txt2)}
.diat-box{margin-top:16px;background:var(--bg2);border:1px solid var(--borde);border-radius:var(--r);padding:12px}
.diat-tit{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--acento2);margin-bottom:10px}
.diat-lista{display:flex;flex-wrap:wrap;gap:7px}
.diat-item{display:flex;flex-direction:column;align-items:center;background:var(--bg);border:1px solid;border-radius:7px;padding:7px 12px;min-width:54px;cursor:pointer;transition:all .2s}
.diat-item:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.diat-item.activo{box-shadow:0 0 0 2px #fff4;transform:translateY(-2px)}
.diat-grado{font-size:10px;font-weight:700}
.diat-nom{font-size:15px;font-weight:800;margin-top:2px}
.prog-box{margin-top:14px;background:var(--bg2);border:1px solid var(--borde);border-radius:var(--r);padding:12px}
.prog-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--acento2);margin-bottom:10px}
.prog-grupo-tit{font-size:11px;color:var(--txt2);font-weight:600;margin:8px 0 5px;text-transform:uppercase;letter-spacing:.5px}
.prog-item{background:var(--bg);border:1px solid var(--borde);border-radius:6px;padding:8px 12px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.prog-item:hover{background:var(--bg3);border-color:var(--acento2)}
.prog-item.tocando{border-color:var(--acento);background:rgba(233,69,96,.08)}
.prog-nombre{font-size:13px;font-weight:600;margin-bottom:3px}
.prog-grados{font-size:12px;color:var(--acento2);font-family:monospace;letter-spacing:.5px}
.prog-ejemplo{font-size:11px;color:var(--txt2);margin-top:2px}
.mastil-wrap{overflow-x:auto;padding-bottom:8px;user-select:none;-webkit-overflow-scrolling:touch}
.m-row{display:flex;align-items:center}
.m-espacio{width:38px;flex-shrink:0}
.marc-celda{width:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;height:16px;gap:5px}
.marc-pto{width:7px;height:7px;border-radius:50%;background:#3a3a5a}
.num-traste{width:52px;flex-shrink:0;text-align:center;font-size:11px;color:var(--txt2)}
.mastil-body{background:var(--madera);border:2px solid var(--madera2);border-radius:4px;padding:6px 0;min-width:fit-content}
.m-cuerda{display:flex;align-items:center;position:relative;height:42px}
.c-label{width:38px;flex-shrink:0;text-align:center;font-size:12px;font-weight:700;color:var(--acento2);position:relative;z-index:2}
.c-linea{position:absolute;left:38px;right:0;background:var(--cuerda);top:50%;transform:translateY(-50%);z-index:0;pointer-events:none;opacity:.7}
.m-celda{width:52px;flex-shrink:0;height:42px;position:relative;display:flex;align-items:center;justify-content:center;z-index:1}
.m-celda.clickable{cursor:pointer}
.m-celda.clickable:hover .nota-pto{transform:scale(1.1)}
.traste-l{position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--fret);border-radius:1px;z-index:1;pointer-events:none}
.nota-pto{position:relative;z-index:3;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .1s,opacity .3s;pointer-events:none}
.nota-pto.dim{opacity:.15;filter:saturate(.2)}
.nota-txt{font-size:9px;font-weight:800;color:#111}
.sound-ripple{position:absolute;width:30px;height:30px;border-radius:50%;animation:ripple .5s ease-out forwards;pointer-events:none;z-index:4}
@keyframes ripple{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50}
@media(max-width:768px){
  .btn-menu{display:block}
  .panel-izq{position:fixed;top:0;left:0;bottom:0;z-index:60;transform:translateX(-100%);width:min(var(--panel-w),90vw);padding-top:90px}
  .panel-izq.open{transform:translateX(0)}
  .overlay.open{display:block}
  .panel-der{padding:10px}
  .tabs .tab{padding:8px 12px;font-size:12px}
  .m-celda{width:44px}.num-traste{width:44px}.marc-celda{width:44px}.nota-pto{width:28px;height:28px}
}
@media(max-width:480px){
  .m-celda{width:38px}.num-traste{width:38px}.marc-celda{width:38px}.nota-pto{width:26px;height:26px}.nota-txt{font-size:8px}
}
</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="hdr">
      <span class="hdr-ico">🎸</span>
      <div class="hdr-txt">
        <h1>Guitar Scale Finder</h1>
        <p>Detecta acordes · Encuentra escalas · Escucha el mástil</p>
      </div>
      <button class="btn-menu" id="btn-menu">☰</button>
    </div>
  </header>
  <div class="overlay" id="overlay"></div>
  <div class="app-body">
    <aside class="panel-izq" id="panel-izq">
      <section class="sec">
        <h2 class="sec-tit">Lista de Acordes</h2>
        <div class="inp-grp">
          <input id="inp-acorde" class="inp" type="text" placeholder="Am, C, G7, Emaj7...">
          <button id="btn-add" class="btn-add">+</button>
        </div>
        <p id="err-msg" class="err-msg" hidden></p>
        <div id="acordes-rapidos" class="acordes-rapidos"></div>
        <div id="chips" class="chips"></div>
        <button id="btn-clear-list" class="btn-txt" hidden>Limpiar lista</button>
      </section>
      <section class="sec sec-escalas">
        <h2 class="sec-tit">Escalas Detectadas</h2>
        <div id="escalas-lista"></div>
      </section>
    </aside>
    <section class="panel-der">
      <div class="tabs">
        <button class="tab tab-on" id="tab-det" onclick="cambiarModo('detector')">🎵 Detectar Acorde</button>
        <button class="tab" id="tab-map" onclick="cambiarModo('mapa')">🗺️ Mapa de Escala</button>
      </div>
      <div id="panel-contenido"></div>
    </section>
  </div>
</div>
<script>
// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
let audioCtx=null;
function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
const FREQ_CUERDAS=[82.41,110.00,146.83,196.00,246.94,329.63]; // E A D G B e

function playNota(cuerda,traste,when=0,dur=1.6){
  try{
    const ctx=getACtx(),freq=FREQ_CUERDAS[cuerda]*Math.pow(2,traste/12),now=ctx.currentTime+when;
    const osc=ctx.createOscillator();osc.type='sawtooth';osc.frequency.setValueAtTime(freq,now);
    const filt=ctx.createBiquadFilter();filt.type='lowpass';filt.frequency.setValueAtTime(2200,now);filt.frequency.exponentialRampToValueAtTime(500,now+1.0);
    const gain=ctx.createGain();gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(0.35,now+0.01);gain.gain.exponentialRampToValueAtTime(0.12,now+0.3);gain.gain.exponentialRampToValueAtTime(0.001,now+dur);
    osc.connect(filt);filt.connect(gain);gain.connect(ctx.destination);
    osc.start(now);osc.stop(now+dur);
  }catch(e){}
}

function playAcorde(notasIdx){
  const usadas=new Set();
  [...notasIdx].forEach(ni=>{
    for(let c=0;c<6;c++){
      if(usadas.has(c))continue;
      for(let t=0;t<=5;t++){
        if((AFINACION[c]+t)%12===ni){playNota(c,t,0,1.8);usadas.add(c);break;}
      }
    }
  });
}

let scalePlayTimer=null,isPlaying=false;
function playScale(posDestac,btn){
  if(isPlaying){clearTimeout(scalePlayTimer);isPlaying=false;if(btn){btn.textContent='▶ Escuchar escala';btn.classList.remove('playing');}return;}
  const seen=new Set();
  const sorted=[...posDestac].sort((a,b)=>a.traste-b.traste||a.cuerda-b.cuerda)
    .filter(p=>{const f=Math.round(FREQ_CUERDAS[p.cuerda]*Math.pow(2,p.traste/12));if(seen.has(f))return false;seen.add(f);return true;}).slice(0,14);
  isPlaying=true;if(btn){btn.textContent='⏹ Detener';btn.classList.add('playing');}
  let i=0;
  function next(){if(!isPlaying||i>=sorted.length){isPlaying=false;if(btn){btn.textContent='▶ Escuchar escala';btn.classList.remove('playing');}return;}playNota(sorted[i].cuerda,sorted[i].traste);i++;scalePlayTimer=setTimeout(next,220);}
  next();
}

let progTimer=null,progActiva=null;
function stopProg(){clearTimeout(progTimer);progActiva=null;document.querySelectorAll('.prog-item.tocando').forEach(el=>el.classList.remove('tocando'));}
function playProgresion(acNames,itemEl){
  stopProg();itemEl.classList.add('tocando');progActiva=itemEl;
  let i=0;
  function next(){
    if(i>=acNames.length){stopProg();return;}
    const p=parsearAcorde(acNames[i].trim());
    if(p){const ac=TIPOS_ACORDE[p.tipo];const ri=NOTAS.indexOf(p.raiz);playAcorde(new Set(ac.intervalos.map(iv=>(ri+iv)%12)));}
    i++;progTimer=setTimeout(next,1500);
  }
  next();
}

// ═══════════════════════════════════════
// DATOS
// ═══════════════════════════════════════
const NOTAS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BEMOLES={Db:'C#',Eb:'D#',Fb:'E',Gb:'F#',Ab:'G#',Bb:'A#',Cb:'B'};
const AFINACION=[4,9,2,7,11,4];
const NOMBRES_CUERDAS=['E','A','D','G','B','e'];
const GROSOR_CUERDAS=[3.5,3,2.5,2,1.5,1];
const COLORES_GRADO=['#ff4444','#ff8c00','#ffd700','#44dd44','#00cccc','#4488ff','#cc44ff'];
const ACORDES_RAPIDOS=['C','Dm','Em','F','G','Am','A','Bm','D','E','G7','Am7'];

const TIPOS_ACORDE={
  mayor:{intervalos:[0,4,7],sufijo:''},menor:{intervalos:[0,3,7],sufijo:'m'},
  dom7:{intervalos:[0,4,7,10],sufijo:'7'},menor7:{intervalos:[0,3,7,10],sufijo:'m7'},
  maj7:{intervalos:[0,4,7,11],sufijo:'maj7'},disminuido:{intervalos:[0,3,6],sufijo:'dim'},
  dim7:{intervalos:[0,3,6,9],sufijo:'dim7'},semidisminuido:{intervalos:[0,3,6,10],sufijo:'m7b5'},
  aumentado:{intervalos:[0,4,8],sufijo:'aug'},sus2:{intervalos:[0,2,7],sufijo:'sus2'},sus4:{intervalos:[0,5,7],sufijo:'sus4'},
};
const MAPA_SUFIJO=Object.fromEntries(Object.entries(TIPOS_ACORDE).map(([k,v])=>[v.sufijo,k]));
const SUFMAP={mayor:'',menor:'m',disminuido:'dim',dom7:'7',aumentado:'aug',semidisminuido:'m7b5',dim7:'dim7',sus2:'sus2',sus4:'sus4'};

const TIPOS_ESCALA={
  mayor:{nombre:'Mayor',color:'#4CAF50',intervalos:[0,2,4,5,7,9,11],
    acordesDiat:['mayor','menor','menor','mayor','mayor','menor','disminuido'],
    grados:['I','ii','iii','IV','V','vi','vii°'],
    progresiones:[
      {nombre:'Pop clásico',grados:[0,4,5,3],txt:'I–V–vi–IV'},
      {nombre:'Blues 12 compases',grados:[0,0,0,0,3,3,0,0,4,3,0,4],txt:'I–I–I–I–IV–IV–I–I–V–IV–I–V'},
      {nombre:'Cánon de Pachelbel',grados:[0,4,5,2,3,0,3,4],txt:'I–V–vi–iii–IV–I–IV–V'},
      {nombre:'50s doo-wop',grados:[0,5,3,4],txt:'I–vi–IV–V'},
    ]},
  menor:{nombre:'Menor Natural',color:'#2196F3',intervalos:[0,2,3,5,7,8,10],
    acordesDiat:['menor','disminuido','mayor','menor','menor','mayor','mayor'],
    grados:['i','ii°','III','iv','v','VI','VII'],
    progresiones:[
      {nombre:'Metal/Rock menor',grados:[0,6,5,6],txt:'i–VII–VI–VII'},
      {nombre:'Andaluza',grados:[0,6,5,4],txt:'i–VII–VI–v'},
      {nombre:'Power ballad',grados:[0,5,2,6],txt:'i–VI–III–VII'},
      {nombre:'Funk/Soul menor',grados:[0,3,6,0],txt:'i–iv–VII–i'},
    ]},

const REGEX_AC=/^([A-G][#b]?)(m7b5|maj7|dim7|m7|aug|dim|sus2|sus4|m|7)?$/;
function normNota(n){return BEMOLES[n]??n;}
function parsearAcorde(txt){
  const m=txt.trim().match(REGEX_AC);if(!m)return null;
  const raiz=normNota(m[1]);const suf=m[2]??'';const tipo=MAPA_SUFIJO[suf];
  if(tipo===undefined)return null;
  return{raiz,tipo,nombre:`${raiz}${TIPOS_ACORDE[tipo].sufijo}`};
}
function getNotasAcorde(nombre){
  const p=parsearAcorde(nombre);if(!p)return new Set();
  const ri=NOTAS.indexOf(p.raiz);
  return new Set(TIPOS_ACORDE[p.tipo].intervalos.map(iv=>(ri+iv)%12));
}

// TEORÍA
// ═══════════════════════════════════════
function sugerirAcordeCercano(notasSet){
  const arr=[...notasSet];if(arr.length<2)return[];
  const res=[];
  for(let ri=0;ri<12;ri++)for(const[tipo,ac]of Object.entries(TIPOS_ACORDE)){
    const acN=ac.intervalos.map(i=>(ri+i)%12),enC=acN.filter(n=>arr.includes(n)),falt=acN.filter(n=>!arr.includes(n));
    if(enC.length>=2&&falt.length===1)res.push({nombre:`${NOTAS[ri]}${ac.sufijo}`,notasAcorde:acN.map(n=>NOTAS[n]),faltantes:falt.map(n=>NOTAS[n]),score:enC.length*10-5});
  }
  const v=new Set();return res.sort((a,b)=>b.score-a.score).filter(s=>{if(v.has(s.nombre))return false;v.add(s.nombre);return true;}).slice(0,5);
}

function identificarAcordeDesdeNotas(notasSet){
  const arr=[...notasSet];if(arr.length<2)return[];
  const res=[];
  for(const ri of arr)for(const[tipo,ac]of Object.entries(TIPOS_ACORDE)){
    const acN=ac.intervalos.map(i=>(ri+i)%12);
    if(acN.every(n=>arr.includes(n)))res.push({nombre:`${NOTAS[ri]}${ac.sufijo}`,raiz:NOTAS[ri],tipo,esExacto:acN.length===arr.length,coincidencias:acN.length,notasAcorde:acN.map(n=>NOTAS[n])});
  }
  return res.sort((a,b)=>(b.esExacto?1:0)-(a.esExacto?1:0)||b.coincidencias-a.coincidencias);
}

function detectarEscala(lista){
  if(!lista.length)return[];
  const parsed=lista.map(parsearAcorde).filter(Boolean);if(!parsed.length)return[];
  const res=[];
  for(const[tipoEsc,escala]of Object.entries(TIPOS_ESCALA)){
    if(!escala.acordesDiat)continue;
    for(let ti=0;ti<12;ti++){
      const diat=escala.intervalos.map((int,g)=>({ri:(ti+int)%12,tipo:escala.acordesDiat[g],grado:escala.grados[g]}));
      const coin=[];
      for(const ac of parsed){const ri=NOTAS.indexOf(ac.raiz);const d=diat.find(d=>d.ri===ri&&(d.tipo===ac.tipo||(d.tipo==='mayor'&&ac.tipo==='dom7')||(d.tipo==='disminuido'&&ac.tipo==='dim7')));if(d)coin.push({acorde:ac.nombre,grado:d.grado});}
      if(coin.length){const pct=Math.round(coin.length/parsed.length*100);res.push({tonica:NOTAS[ti],tipo:tipoEsc,nombre:`${NOTAS[ti]} ${escala.nombre}`,color:escala.color,coincidencias:coin.length,total:parsed.length,porcentaje:pct,coin});}
    }
  }
  return res.sort((a,b)=>b.porcentaje-a.porcentaje||b.coincidencias-a.coincidencias).slice(0,10);
}

function generarMapa(tonicaNom,tipoEsc,numTrastes=12){
  const esc=TIPOS_ESCALA[tipoEsc];if(!esc)return[];
  const ti=NOTAS.indexOf(tonicaNom);if(ti<0)return[];
  const notasEsc=esc.intervalos.map(i=>(ti+i)%12);
  const pos=[];
  for(let c=0;c<6;c++)for(let t=0;t<=numTrastes;t++){
    const ni=(AFINACION[c]+t)%12;const g=notasEsc.indexOf(ni);
    if(g!==-1)pos.push({cuerda:c,traste:t,notaIdx:ni,notaNom:NOTAS[ni],grado:g,esTonica:ni===ti});
  }
  return pos;
}

function htmlMastil(posSelec,posDestac=[],clickable=true){
  const mapaDest=new Map(posDestac.map(p=>[`${p.cuerda}-${p.traste}`,p]));
  let h='<div class="mastil-wrap">';
  h+='<div class="m-row" style="height:18px;margin-bottom:2px"><div class="m-espacio"></div>';
  for(let t=0;t<=12;t++){h+='<div class="marc-celda">';if([3,5,7,9].includes(t))h+='<div class="marc-pto"></div>';else if(t===12)h+='<div class="marc-pto"></div><div class="marc-pto"></div>';h+='</div>';}
  h+='</div>';
  h+='<div class="m-row" style="margin-bottom:3px"><div class="m-espacio"></div>';
  for(let t=0;t<=12;t++)h+=`<div class="num-traste">${t||''}</div>`;
  h+='</div><div class="mastil-body">';
  for(let c=5;c>=0;c--){
    h+=`<div class="m-cuerda"><div class="c-label">${NOMBRES_CUERDAS[c]}</div>`;
    h+=`<div class="c-linea" style="height:${GROSOR_CUERDAS[c]}px"></div>`;
    for(let t=0;t<=12;t++){
      const ni=(AFINACION[c]+t)%12;const key=`${c}-${t}`;
      const sel=posSelec.has(key);const dest=mapaDest.get(key);
      const color=dest?COLORES_GRADO[dest.grado]:sel?'#ffd700':null;
      h+=`<div class="m-celda${clickable?' clickable':''}" data-c="${c}" data-t="${t}" data-ni="${ni}">`;
      if(t>0)h+='<div class="traste-l"></div>';
      if(color)h+=`<div class="nota-pto" style="background:${color};box-shadow:0 0 8px ${color}80"><span class="nota-txt">${dest?dest.notaNom:NOTAS[ni]}</span></div>`;
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

function renderDetector(cont){
  const notasSet=new Set();est.posSelec.forEach(({notaIdx})=>notasSet.add(notaIdx));
  const acordes=identificarAcordeDesdeNotas(notasSet);
  let h=`<div class="det-barra"><p class="det-instr">Toca el mástil · una nota por cuerda</p><button class="btn-sec" onclick="limpiarMastil()">Limpiar</button></div>`;
  h+=htmlMastil(est.posSelec,[],true);
  if(notasSet.size){
    h+=`<div class="panel-res"><p class="res-notas">Notas: ${[...notasSet].map(i=>NOTAS[i]).join(' · ')}</p>`;
    if(est.posSelec.size<3){h+=`<p class="res-sin">Selecciona al menos 3 cuerdas.</p>`;}
    else if(acordes.length){
      h+=`<p class="res-tit">Acordes identificados:</p><div class="acordes-det">`;
      acordes.slice(0,6).forEach(ac=>{h+=`<div class="ac-card ${ac.esExacto?'exacto':'parcial'}"><div class="ac-fila-top"><span class="ac-nom">${ac.nombre}</span><span class="ac-tipo">${ac.esExacto?'✓ exacto':'~ parcial'}</span><button class="btn-ag-det" onclick="agregarDetectado('${ac.nombre}')">+ Lista</button></div><div class="ac-notas-det">${ac.notasAcorde.join(' · ')}</div></div>`;});
      h+='</div>';
    }else{
      const sug=sugerirAcordeCercano(notasSet);
      if(sug.length){h+=`<p class="res-tit">¿Quisiste decir...?</p><div class="acordes-det">`;sug.forEach(s=>{h+=`<div class="ac-card sugerencia"><div class="ac-fila-top"><span class="ac-nom">${s.nombre}</span><span class="ac-tipo sug-falta">falta: <b>${s.faltantes.join(', ')}</b></span></div><div class="ac-notas-det">${s.notasAcorde.join(' · ')}</div></div>`;});h+='</div>';}
      else h+='<p class="res-sin">Combinación no estándar.</p>';
    }
    h+='</div>';
  }
  cont.innerHTML=h;
  cont.querySelector('.mastil-body').addEventListener('click',e=>{
    const celda=e.target.closest('[data-c]');if(!celda)return;
    const c=celda.dataset.c,t=+celda.dataset.t,ni=+celda.dataset.ni,key=`${c}-${t}`;
    if(est.posSelec.has(key)){est.posSelec.delete(key);}
    else{for(const k of[...est.posSelec.keys()])if(k.startsWith(`${c}-`))est.posSelec.delete(k);est.posSelec.set(key,{notaIdx:ni});const pto=celda.querySelector('.nota-pto');if(pto){const r=document.createElement('div');r.className='sound-ripple';r.style.background='#ffd700';celda.appendChild(r);setTimeout(()=>r.remove(),500);}playNota(+c,t);}
    renderDetector(cont);
  });
}

function renderMapa(cont){
  clearHighlight();
  const escala=TIPOS_ESCALA[est.tipoEsc];
  const posDestac=generarMapa(est.tonica,est.tipoEsc);
  const ti=NOTAS.indexOf(est.tonica);

  let h=`<div class="mapa-ctrl">
    <div class="ctrl-grp"><label class="ctrl-lab">Tónica</label>
      <select class="ctrl-sel" id="sel-ton">${NOTAS.map(n=>`<option${n===est.tonica?' selected':''}>${n}</option>`).join('')}</select>
    </div>
    <div class="ctrl-grp"><label class="ctrl-lab">Escala</label>
      <select class="ctrl-sel" id="sel-esc">${Object.entries(TIPOS_ESCALA).map(([k,e])=>`<option value="${k}"${k===est.tipoEsc?' selected':''}>${e.nombre}</option>`).join('')}</select>
    </div>
    <button class="btn-play" id="btn-play-scale">▶ Escuchar escala</button>
    <label class="sw-label">
      <span>Ver en mástil</span>
      <span id="sw-mastil" class="sw-track" style="background:var(--borde)">
        <span class="sw-thumb" style="left:3px"></span>
      </span>
    </label>
  </div>`;

  h+=htmlMastil(new Map(),posDestac,true);

  h+='<div class="leyenda">';
  escala.grados.forEach((g,i)=>h+=`<div class="ley-item"><div class="ley-col" style="background:${COLORES_GRADO[i]}"></div><span class="ley-txt">${g}${i===0?' ('+est.tonica+')':''}</span></div>`);
  h+='</div>';

  if(escala.acordesDiat){
    h+=`<div class="diat-box"><p class="diat-tit">Acordes diatónicos <span style="color:var(--txt2);font-size:10px">— toca para escuchar</span></p><div class="diat-lista" id="diat-lista">`;
    escala.intervalos.forEach((int,i)=>{
      const ri=(ti+int)%12;const suf=SUFMAP[escala.acordesDiat[i]]??'';const nom=`${NOTAS[ri]}${suf}`;
      h+=`<div class="diat-item" style="border-color:${COLORES_GRADO[i]}" data-acorde="${nom}" data-color="${COLORES_GRADO[i]}">
        <span class="diat-grado" style="color:${COLORES_GRADO[i]}">${escala.grados[i]}</span>
        <span class="diat-nom">${nom}</span>
      </div>`;
    });
    h+='</div></div>';
  }

  const progs=escala.progresiones||[];

  // Progresiones diatónicas de la escala
  let progHtml='';
  if(progs.length){
    progHtml+=`<p class="prog-grupo-tit">🎵 ${escala.nombre}</p>`;
    progs.forEach(p=>{
      let acReal;
      if(p.manual){acReal=p.acordes;}
      else{acReal=p.grados.map(g=>{const i2=((g%escala.intervalos.length)+escala.intervalos.length)%escala.intervalos.length;const ri=(ti+escala.intervalos[i2])%12;return `${NOTAS[ri]}${SUFMAP[escala.acordesDiat[i2]]??''}`;});}
      progHtml+=`<div class="prog-item" data-acordes="${acReal.join(',')}"><div class="prog-nombre">${p.nombre}</div><div class="prog-grados">${p.txt}</div><div class="prog-ejemplo">▶ ${acReal.join(' – ')}</div></div>`;
    });
  }

  // Progresiones regionales — mostrar todas, transpuestas a la tónica actual
  Object.values(PROGS_REGIONALES).forEach(region=>{
    progHtml+=`<p class="prog-grupo-tit">${region.label}</p>`;
    region.progs.forEach(p=>{
      const acReal=acorDesDeGrados(p.grados,ti);
      progHtml+=`<div class="prog-item" data-acordes="${acReal.join(',')}"><div class="prog-nombre">${p.nombre}</div><div class="prog-grados">${p.txt}</div><div class="prog-ejemplo">▶ ${acReal.join(' – ')}</div></div>`;
    });
  });

  if(progHtml){
    h+=`<div class="prog-box"><p class="prog-tit">🌍 Progresiones en ${est.tonica}</p>${progHtml}</div>`;
  }

  cont.innerHTML=h;

  // Switch — sincronizar estado visual tras render
  syncSwitch();
  document.getElementById('sw-mastil').addEventListener('click',()=>{
    mostrarEnMastil=!mostrarEnMastil;
    if(!mostrarEnMastil)clearHighlight();
    syncSwitch();
  });

  document.getElementById('sel-ton').addEventListener('change',e=>{est.tonica=e.target.value;renderMapa(cont);});
  document.getElementById('sel-esc').addEventListener('change',e=>{est.tipoEsc=e.target.value;renderMapa(cont);});
  document.getElementById('btn-play-scale').addEventListener('click',function(){playScale(posDestac,this);});

  // Tocar nota individual en mástil
  cont.querySelector('.mastil-body').addEventListener('click',e=>{
    const celda=e.target.closest('[data-c]');if(!celda)return;
    const c=+celda.dataset.c,t=+celda.dataset.t;
    const pto=celda.querySelector('.nota-pto');if(!pto)return;
    const r=document.createElement('div');r.className='sound-ripple';r.style.background=pto.style.background||'#fff';celda.appendChild(r);setTimeout(()=>r.remove(),500);
    playNota(c,t);
  });

  // Acordes diatónicos
  const diatLista=cont.querySelector('#diat-lista');
  if(diatLista)diatLista.addEventListener('click',e=>{
    const item=e.target.closest('[data-acorde]');if(!item)return;
    const nom=item.dataset.acorde,color=item.dataset.color;

    // Limpiar estado anterior sin re-render
    clearHighlight();

    // Tocar acorde simultáneo
    const notasIdx=getNotasAcorde(nom);
    playAcorde(notasIdx);

    if(mostrarEnMastil){
      est.acordeDiatSel=nom;est.acordeDiatColor=color;
      hlAcordeIdx=notasIdx;
      item.classList.add('activo');
      applyHighlight(hlAcordeIdx);

      let seg=35;
      updateBanner(nom,hlAcordeIdx,color,seg);
      hlCountdownInterval=setInterval(()=>{
        seg--;
        updateBanner(nom,hlAcordeIdx,color,seg);
      },1000);
      acorDeHighlightTimer=setTimeout(()=>{
        clearHighlight();
      },5000);
    }
  });

  // Progresiones
  cont.querySelectorAll('.prog-item').forEach(el=>{
    el.addEventListener('click',()=>{
      if(el.classList.contains('tocando')){stopProg();return;}
      playProgresion(el.dataset.acordes.split(','),el);
    });
  });
}

// ═══════════════════════════════════════
// ACCIONES
// ═══════════════════════════════════════
function agregarAcorde(txt){
  const partes=txt.split(/[,;]+/).map(s=>s.trim()).filter(Boolean);const inv=[];let ag=0;
  partes.forEach(p=>{const pa=parsearAcorde(p);if(pa){if(!est.listaAcordes.includes(pa.nombre))est.listaAcordes.push(pa.nombre);ag++;}else inv.push(p);});
  const err=document.getElementById('err-msg');
  if(inv.length){err.textContent=`No válido: ${inv.map(v=>`"${v}"`).join(', ')}`;err.hidden=false;}else err.hidden=true;
  if(ag)document.getElementById('inp-acorde').value='';
  renderIzq();
}
function eliminarAcorde(a){est.listaAcordes=est.listaAcordes.filter(x=>x!==a);renderIzq();}
function limpiarMastil(){est.posSelec.clear();renderDer();}
function agregarDetectado(nom){const p=parsearAcorde(nom);if(p&&!est.listaAcordes.includes(p.nombre))est.listaAcordes.push(p.nombre);est.posSelec.clear();renderIzq();renderDer();}
function verMapa(tonica,tipo){est.tonica=tonica;est.tipoEsc=tipo;est.modo='mapa';renderDer();cerrarPanel();}

// ═══════════════════════════════════════
// MENÚ MÓVIL
// ═══════════════════════════════════════
function cerrarPanel(){document.getElementById('panel-izq').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
document.getElementById('btn-menu').addEventListener('click',()=>{document.getElementById('panel-izq').classList.toggle('open');document.getElementById('overlay').classList.toggle('open');});
document.getElementById('overlay').addEventListener('click',cerrarPanel);

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.getElementById('acordes-rapidos').innerHTML=ACORDES_RAPIDOS.map(a=>`<button class="btn-rapido" onclick="agregarAcorde('${a}')">${a}</button>`).join('');
document.getElementById('inp-acorde').addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v)agregarAcorde(v);}});
document.getElementById('btn-add').addEventListener('click',()=>{const v=document.getElementById('inp-acorde').value.trim();if(v)agregarAcorde(v);});
document.getElementById('btn-clear-list').addEventListener('click',()=>{est.listaAcordes=[];renderIzq();});
renderIzq();renderDer();
</script>
</body>
